<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录示例 - 使用后端 API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background: #0056b3;
        }
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
        }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>登录示例</h1>
    <p>演示如何使用后端 API 进行用户认证</p>

    <div class="form-group">
        <label for="username">用户名:</label>
        <input type="text" id="username" value="guest" placeholder="输入用户名">
    </div>

    <div class="form-group">
        <label for="password">密码:</label>
        <input type="password" id="password" value="guest" placeholder="输入密码">
    </div>

    <div class="form-group">
        <label for="email">邮箱 (注册时使用):</label>
        <input type="email" id="email" placeholder="可选">
    </div>

    <div>
        <button onclick="handleLogin()">登录</button>
        <button onclick="handleRegister()">注册</button>
        <button onclick="handleLogout()">登出</button>
        <button onclick="handleVerify()">验证Token</button>
    </div>

    <div id="message"></div>

    <!-- 引入 APIClient -->
    <script src="/static/core/APIClient.js"></script>

    <script>
        // 显示消息
        function showMessage(text, type = 'info') {
            const messageDiv = document.getElementById('message');
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = text;
        }

        // 登录
        async function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showMessage('请输入用户名和密码', 'error');
                return;
            }

            try {
                showMessage('登录中...', 'info');
                const result = await APIClient.login(username, password);
                
                // 保存 Token 和用户信息
                localStorage.setItem('token', result.token);
                localStorage.setItem('user', JSON.stringify(result));

                showMessage(`
                    <strong>登录成功！</strong><br>
                    用户ID: ${result.user_id}<br>
                    用户名: ${result.username}<br>
                    角色: ${result.roles.join(', ')}<br>
                    Token: ${result.token.substring(0, 20)}...<br>
                    <pre>${JSON.stringify(result, null, 2)}</pre>
                `, 'success');
            } catch (error) {
                showMessage(`<strong>登录失败：</strong>${error.message}`, 'error');
            }
        }

        // 注册
        async function handleRegister() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const email = document.getElementById('email').value || null;

            if (!username || !password) {
                showMessage('请输入用户名和密码', 'error');
                return;
            }

            try {
                showMessage('注册中...', 'info');
                const result = await APIClient.register(username, password, email);
                
                showMessage(`
                    <strong>注册成功！</strong><br>
                    <pre>${JSON.stringify(result, null, 2)}</pre>
                    <br>现在可以使用该账号登录了。
                `, 'success');
            } catch (error) {
                showMessage(`<strong>注册失败：</strong>${error.message}`, 'error');
            }
        }

        // 登出
        async function handleLogout() {
            const token = localStorage.getItem('token');
            
            if (!token) {
                showMessage('未登录', 'error');
                return;
            }

            try {
                showMessage('登出中...', 'info');
                await APIClient.logout(token);
                
                // 清除本地存储
                localStorage.removeItem('token');
                localStorage.removeItem('user');

                showMessage('<strong>登出成功！</strong>', 'success');
            } catch (error) {
                showMessage(`<strong>登出失败：</strong>${error.message}`, 'error');
            }
        }

        // 验证 Token
        async function handleVerify() {
            const token = localStorage.getItem('token');
            
            if (!token) {
                showMessage('未找到 Token，请先登录', 'error');
                return;
            }

            try {
                showMessage('验证中...', 'info');
                const result = await APIClient.verifyToken(token);
                
                showMessage(`
                    <strong>Token 有效！</strong><br>
                    用户ID: ${result.user_id}<br>
                    用户名: ${result.username}<br>
                    过期时间: ${result.expires_at}<br>
                    <pre>${JSON.stringify(result, null, 2)}</pre>
                `, 'success');
            } catch (error) {
                showMessage(`<strong>Token 无效：</strong>${error.message}<br>请重新登录`, 'error');
                localStorage.removeItem('token');
                localStorage.removeItem('user');
            }
        }

        // 页面加载时检查登录状态
        window.addEventListener('DOMContentLoaded', () => {
            const user = localStorage.getItem('user');
            if (user) {
                try {
                    const userData = JSON.parse(user);
                    showMessage(`
                        <strong>已登录</strong><br>
                        用户: ${userData.username}<br>
                        角色: ${userData.roles.join(', ')}
                    `, 'info');
                } catch (e) {
                    console.error('解析用户数据失败:', e);
                }
            }
        });
    </script>
</body>
</html>
